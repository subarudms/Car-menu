<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suzuki 線上購車清單</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        .active-tab { border-bottom: 3px solid #065f46; color: #065f46; font-weight: bold; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        /* 簡單的彈窗樣式 */
        #summary-modal { display: none; }
    </style>
</head>
<body class="bg-gray-50 pb-24">

    <header class="bg-white sticky top-0 shadow-sm z-10">
        <div class="text-center py-4 border-b">
            <h1 class="text-lg font-bold">新車點餐選擇 - 線上即時報價</h1>
        </div>
        <nav id="category-nav" class="flex overflow-x-auto whitespace-nowrap px-4 py-2 text-sm bg-white border-b hide-scroll"></nav>
    </header>

    <main id="product-list" class="p-4 grid grid-cols-2 gap-4">
        <p class="col-span-2 text-center py-10 text-gray-400">系統連線中...</p>
    </main>

    <footer class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 flex items-center justify-between shadow-2xl">
        <div class="flex items-center">
            <div class="relative bg-green-50 p-2 rounded-lg">
                <span id="cart-count" class="absolute -top-2 -right-2 bg-black text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full">0</span>
                <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 text-green-800" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                </svg>
            </div>
            <div class="ml-4">
                <p class="text-[10px] text-gray-400 font-bold uppercase">Estimated Total</p>
                <p class="text-xl font-black text-gray-800">$ <span id="total-price">0</span></p>
            </div>
        </div>
        <button onclick="toggleModal(true)" class="bg-[#065f46] text-white px-8 py-3 rounded-xl font-bold active:scale-95 shadow-lg">查看購車清單</button>
    </footer>

    <div id="summary-modal" class="fixed inset-0 bg-black/50 z-50 flex items-end justify-center">
        <div class="bg-white w-full max-w-md rounded-t-3xl p-6 max-h-[80vh] overflow-y-auto">
            <div class="flex justify-between items-center mb-4 border-b pb-2">
                <h2 class="text-xl font-bold text-gray-800">已選擇項目</h2>
                <button onclick="toggleModal(false)" class="text-gray-400 text-2xl">&times;</button>
            </div>
            <div id="cart-items-list" class="space-y-4">
                </div>
            <div class="mt-6 pt-4 border-t">
                <div class="flex justify-between text-lg font-bold mb-6">
                    <span>總計金額</span>
                    <span class="text-[#065f46]">$ <span id="modal-total">0</span></span>
                </div>
                <button onclick="toggleModal(false)" class="w-full bg-[#065f46] text-white py-4 rounded-xl font-bold">返回繼續點選</button>
            </div>
        </div>
    </div>

    <script>
        const sheetID = '1-FY0lTyZhZfeMk4VGIjATYbWF16HAck2oLhxi1JD0rw';
        const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;

        let allProducts = [];
        let currentCategory = '';
        let total = 0;
        let selectedItems = [];

        async function loadData() {
            try {
                const res = await fetch(url);
                const text = await res.text();
                const json = JSON.parse(text.substr(47).slice(0, -2));
                const rows = json.table.rows;

                allProducts = rows.map(row => ({
                    category: row.c[0]?.v || '其他',
                    name: row.c[1]?.v || '',
                    price: row.c[2]?.v || 0,
                    desc: row.c[3]?.v || '',
                    img: row.c[4]?.v || 'https://via.placeholder.com/150',
                    status: row.c[5]?.v || ''
                }));

                const categories = [...new Set(allProducts.map(p => p.category))];
                currentCategory = categories[0]; // 預設選第一個分類
                renderCategories();
                filterProducts(currentCategory);
            } catch (e) {
                document.getElementById('product-list').innerHTML = `<p class="col-span-2 text-center text-red-500">讀取失敗</p>`;
            }
        }

        function renderCategories() {
            const categories = [...new Set(allProducts.map(p => p.category))];
            const nav = document.getElementById('category-nav');
            nav.innerHTML = categories.map(cat => `
                <span onclick="filterProducts('${cat}')" class="px-4 py-2 cursor-pointer ${cat === currentCategory ? 'active-tab' : 'text-gray-500'}">${cat}</span>
            `).join('');
        }

        function filterProducts(cat) {
            currentCategory = cat;
            renderCategories();
            const filtered = allProducts.filter(p => p.category === cat);
            const list = document.getElementById('product-list');
            list.innerHTML = filtered.map(item => `
                <div class="bg-white rounded-2xl shadow-sm overflow-hidden border border-gray-100 flex flex-col scale-in">
                    <div class="relative pt-[75%]">
                        <img src="${item.img}" class="absolute inset-0 w-full h-full object-cover">
                    </div>
                    <div class="p-3 flex-1 flex flex-col justify-between text-center">
                        <h3 class="font-bold text-gray-800 text-sm truncate">${item.name}</h3>
                        <p class="text-[#065f46] font-black my-2">$${item.price.toLocaleString()}</p>
                        <button onclick="addToCart('${item.name}', ${item.price})" class="w-full bg-[#065f46] text-white text-xs py-2 rounded-lg font-bold">加入</button>
                    </div>
                </div>
            `).join('');
        }

        function addToCart(name, price) {
            selectedItems.push({ id: Date.now(), name, price });
            updateCart();
        }

        function removeFromCart(id) {
            selectedItems = selectedItems.filter(item => item.id !== id);
            updateCart();
        }

        function updateCart() {
            total = selectedItems.reduce((sum, item) => sum + item.price, 0);
            document.getElementById('total-price').innerText = total.toLocaleString();
            document.getElementById('modal-total').innerText = total.toLocaleString();
            document.getElementById('cart-count').innerText = selectedItems.length;
            
            const cartList = document.getElementById('cart-items-list');
            cartList.innerHTML = selectedItems.map(item => `
                <div class="flex justify-between items-center">
                    <div>
                        <p class="font-bold text-gray-800">${item.name}</p>
                        <p class="text-sm text-green-700">$${item.price.toLocaleString()}</p>
                    </div>
                    <button onclick="removeFromCart(${item.id})" class="text-red-500 text-xs border border-red-200 px-3 py-1 rounded-full font-bold">取消</button>
                </div>
            `).join('');
        }

        function toggleModal(show) {
            document.getElementById('summary-modal').style.display = show ? 'flex' : 'none';
        }

        loadData();
    </script>
</body>
</html>
