<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SUZUKI 購車選單</title>
    
    <link rel="apple-touch-icon" href="https://i.postimg.cc/Y2n3JhwG/wen-jian3-172.jpg">
    <link rel="icon" type="image/jpeg" href="https://i.postimg.cc/Y2n3JhwG/wen-jian3-172.jpg">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="SUZUKI選單">
    <meta name="theme-color" content="#003399">

    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        :root { --suzuki-red: #E60012; --suzuki-blue: #003399; }
        .active-tab { border-bottom: 3px solid var(--suzuki-red); color: var(--suzuki-red); font-weight: bold; }
        .hide-scroll::-webkit-scrollbar { display: none; }
        
        .click-heavy {
            transition: all 0.15s cubic-bezier(0.175, 0.885, 0.32, 1.275) !important;
            -webkit-tap-highlight-color: transparent !important;
        }
        .click-heavy:active { transform: scale(0.85) !important; filter: brightness(0.8); }

        @keyframes success-flash {
            0% { background-color: var(--suzuki-red); }
            50% { background-color: #009944; transform: scale(1.05); }
            100% { background-color: var(--suzuki-red); }
        }
        .added-success { animation: success-flash 0.4s ease-out; }

        @keyframes super-bounce {
            0%, 100% { transform: scale(1); }
            40% { transform: scale(1.5) rotate(-10deg); }
            70% { transform: scale(1.2) rotate(10deg); }
        }
        .animate-super-bounce { animation: super-bounce 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        /* 圖片放大燈箱樣式 */
        #image-lightbox {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.9);
            z-index: 200;
            cursor: zoom-out;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
    </style>
</head>
<body class="bg-gray-100 pb-24 font-sans text-gray-800 select-none">

    <div id="main-app">
        <header class="bg-white sticky top-0 shadow-md z-10 text-center py-4">
            <h1 class="text-lg font-black tracking-widest text-gray-900 uppercase">Suzuki 購車選單</h1>
            <nav id="category-nav" class="flex overflow-x-auto whitespace-nowrap px-4 py-2 text-sm bg-white hide-scroll"></nav>
        </header>

        <main id="product-list" class="p-4 grid grid-cols-2 gap-4 items-start">
            <p class="col-span-2 text-center py-20 text-gray-400 font-bold animate-pulse">SUZUKI 資料載入中...</p>
        </main>

        <footer class="fixed bottom-0 left-0 right-0 bg-white border-t p-4 flex items-center justify-between shadow-[0_-5px_20px_rgba(0,0,0,0.1)] z-20">
            <div class="flex items-center">
                <div id="cart-icon-container" class="relative bg-blue-50 p-2 rounded-xl">
                    <span id="cart-count" class="absolute -top-2 -right-2 bg-[#E60012] text-white text-[10px] w-5 h-5 flex items-center justify-center rounded-full font-bold shadow-md">0</span>
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-7 w-7 text-[#003399]" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M16 11V7a4 4 0 00-8 0v4M5 9h14l1 12H4L5 9z" />
                    </svg>
                </div>
                <div class="ml-4">
                    <p class="text-xl font-black text-[#003399] tracking-tighter">$ <span id="total-price">0</span></p>
                </div>
            </div>
            <button onclick="toggleModal(true)" class="bg-[#E60012] text-white click-heavy px-8 py-4 rounded-2xl font-black shadow-lg">查看內容</button>
        </footer>
    </div>

    <div id="image-lightbox" onclick="this.style.display='none'">
        <img id="lightbox-img" class="max-w-full max-h-full rounded-lg shadow-2xl transition-transform duration-300">
    </div>
    <div id="summary-modal" class="fixed inset-0 bg-black/80 z-50 flex items-end justify-center" style="display: none;">
        <div class="bg-white w-full max-w-md rounded-t-[2.5rem] p-6 max-h-[85vh] flex flex-col overflow-hidden text-sm shadow-2xl">
            <div class="flex justify-between items-center mb-4 border-b pb-4">
                <h2 class="text-xl font-bold text-gray-800">已選擇項目</h2>
                <button onclick="toggleModal(false)" class="text-gray-300 text-4xl leading-none click-heavy">&times;</button>
            </div>
            <div id="cart-items-list" class="flex-1 overflow-y-auto space-y-3"></div>
            <div class="mt-4 pt-4 border-t space-y-3 bg-gray-50 -mx-6 px-6 pb-8">
                <div class="flex justify-between items-center font-bold">
                    <span>原始車價總計</span>
                    <span>$ <span id="original-total">0</span></span>
                </div>
                <div id="tax-section" class="flex flex-col space-y-1 hidden">
                    <div class="flex justify-between items-center text-[#003399] font-bold bg-blue-100 p-2 rounded-lg">
                        <span>新購車貨物稅補助 <span id="tax-car-count"></span></span>
                        <span>- $ <span id="tax-total-display">0</span></span>
                    </div>
                </div>
                <div class="flex justify-between items-center py-2">
                    <span class="font-bold text-red-600">折讓優惠金額</span>
                    <input type="number" id="manual-discount" oninput="calculateFinalTotal()" placeholder="0" class="w-24 text-right focus:outline-none text-red-600 font-black bg-transparent text-lg border-b-2 border-red-100">
                </div>
                <div class="flex justify-between items-center pt-3 border-t-2">
                    <span class="text-lg font-bold">預估成交總額</span>
                    <span class="text-3xl font-black text-[#003399]">$ <span id="final-total">0</span></span>
                </div>
                <button onclick="generateReceipt()" class="w-full bg-[#E60012] text-white click-heavy py-5 rounded-2xl font-black shadow-xl mt-2">生成報價明細單</button>
            </div>
        </div>
    </div>

        <!-- 報價單截圖畫面 -->
    <div id="receipt-view" class="hidden fixed inset-0 bg-white z-[100] overflow-y-auto p-4 text-gray-900">
        <div class="max-w-md mx-auto receipt-shadow border border-gray-100 rounded-[2rem] overflow-hidden bg-white mt-4">
            <div class="bg-[#003399] text-white p-8 text-center">
                <h2 class="text-3xl font-black tracking-[0.3em] uppercase">Suzuki</h2>
                <p class="text-xs opacity-70 mt-2 font-bold uppercase tracking-widest">Quotation Details</p>
            </div>
            <div class="p-8 text-left">
                <div class="flex justify-between text-[10px] text-gray-400 mb-8 border-b pb-2 font-bold">
                    <span>日期：<span id="receipt-date"></span></span>
                    <span>NO. <span id="receipt-no"></span></span>
                </div>
                <div id="receipt-items" class="space-y-5 mb-10"></div>
                                <div class="border-t-2 border-dashed border-gray-200 pt-8 space-y-4">
                    <div class="flex justify-between text-gray-400 font-bold">
                        <span>原始總價</span>
                        <span id="receipt-original"></span>
                    </div>
                    
                    <div id="receipt-tax-row" class="flex flex-col space-y-1 hidden">
                        <div class="flex justify-between text-[#003399] font-black bg-blue-50 p-2 rounded-lg">
                            <span>新購車貨物稅補助 <span id="receipt-tax-count"></span></span>
                            <span id="receipt-tax-total"></span>
                        </div>
                        <p class="text-[9px] text-blue-400 text-right font-medium italic">* 需先入車款後由公司三個月內退至車主帳戶</p>
                    </div>

                    <div id="receipt-discount-row" class="flex justify-between text-red-600 font-black hidden bg-red-50 p-2 rounded-lg">
                        <span>其他優惠折讓</span>
                        <span id="receipt-discount"></span>
                    </div>

                    <div class="flex justify-between items-center pt-6 border-t-2 border-gray-900">
                        <span class="text-xl font-black text-gray-900">成交總計</span>
                        <span class="text-4xl font-black text-[#003399]" id="receipt-final"></span>
                    </div>
                    </div>
                    <div id="receipt-discount-row" class="flex justify-between text-red-600 font-black hidden bg-red-50 p-2 rounded-lg">
                        <span>其他優惠折讓</span>
                        <span id="receipt-discount"></span>
                    </div>
                    <div class="flex justify-between items-center pt-6 border-t-2 border-gray-900">
                        <span class="text-xl font-black text-gray-900">成交總計</span>
                        <span class="text-4xl font-black text-[#003399]" id="receipt-final"></span>
                    </div>
                </div>
            </div>
        </div>
        <div class="max-w-md mx-auto mt-8 px-4 flex gap-4 pb-20">
            <button onclick="closeReceipt()" class="flex-1 bg-gray-100 text-gray-600 py-4 rounded-2xl font-bold click-heavy">返回修改</button>
            <button onclick="window.print()" class="flex-1 bg-gray-900 text-white py-4 rounded-2xl font-bold click-heavy shadow-lg">儲存分享</button>
        </div>
    </div>


    <script>
        const sheetID = '1-FY0lTyZhZfeMk4VGIjATYbWF16HAck2oLhxi1JD0rw';
        const url = `https://docs.google.com/spreadsheets/d/${sheetID}/gviz/tq?tqx=out:json`;

        let allProducts = [];
        let currentCategory = '';
        let selectedItems = [];

        async function loadData() {
            try {
                const res = await fetch(url);
                const text = await res.text();
                const json = JSON.parse(text.substr(47).slice(0, -2));
                const rows = json.table.rows;
                allProducts = rows.map(row => ({
                    category: row.c[0]?.v || '其他',
                    name: row.c[1]?.v || '',
                    price: row.c[2]?.v || 0,
                    desc: row.c[3]?.v || '',
                    img: row.c[4]?.v || 'https://via.placeholder.com/150',
                    status: row.c[5]?.v || '' // 讀取 Status 欄位
                }));
                const categories = [...new Set(allProducts.map(p => p.category))];
                currentCategory = categories[0];
                renderCategories();
                filterProducts(currentCategory);
            } catch (e) { console.error(e); }
        }

        function renderCategories() {
            const categories = [...new Set(allProducts.map(p => p.category))];
            const nav = document.getElementById('category-nav');
            nav.innerHTML = categories.map(cat => `
                <span onclick="filterProducts('${cat}')" class="px-5 py-2 cursor-pointer click-heavy rounded-full ${cat === currentCategory ? 'active-tab' : 'text-gray-400'}">${cat}</span>
            `).join('');
        }

        function filterProducts(cat) {
            currentCategory = cat;
            renderCategories();
            // 過濾掉 Status 為「隱藏」的品項
            const filtered = allProducts.filter(p => p.category === cat && p.status !== '隱藏');
            const list = document.getElementById('product-list');
            list.innerHTML = filtered.map(item => `
                <div class="bg-white rounded-[1.5rem] shadow-sm overflow-hidden flex flex-col h-full active:scale-95 transition-transform duration-150">
                    <div class="relative pt-[75%] bg-gray-100" onclick="zoomImage('${item.img}')">
                        <img src="${item.img}" class="absolute inset-0 w-full h-full object-cover">
                        <div class="absolute bottom-2 right-2 bg-black/50 text-white p-1 rounded-full"><svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg></div>
                    </div>
                    <div class="p-4 flex-1 flex flex-col justify-between">
                        <div class="mb-3 text-center">
                            <h3 class="font-black text-gray-900 text-sm leading-tight mb-1">${item.name}</h3>
                            <p class="text-[10px] text-gray-400 line-clamp-2">${item.desc}</p>
                        </div>
                        <div>
                            <p class="text-[#003399] font-black text-center text-lg mb-3">$${item.price.toLocaleString()}</p>
                            <button onclick="addToCart('${item.name}', ${item.price}, this)" class="w-full bg-[#E60012] text-white text-xs py-3 rounded-xl font-black click-heavy shadow-md">加入</button>
                        </div>
                    </div>
                </div>
            `).join('');
        }

        function zoomImage(src) {
            const lightbox = document.getElementById('image-lightbox');
            const img = document.getElementById('lightbox-img');
            img.src = src;
            lightbox.style.display = 'flex';
        }

        function addToCart(name, price, btn) {
            if (window.navigator.vibrate) window.navigator.vibrate([60, 40, 60]);
            selectedItems.push({ id: Date.now(), name, price });
            btn.innerText = "已加入 ✓";
            btn.classList.add('added-success');
            setTimeout(() => { btn.innerText = "加入"; btn.classList.remove('added-success'); }, 600);
            const cartIcon = document.getElementById('cart-icon-container');
            cartIcon.classList.add('animate-super-bounce');
            setTimeout(() => cartIcon.classList.remove('animate-super-bounce'), 400);
            updateCartUI();
        }

        // 其餘邏輯 (removeFromCart, updateCartUI, calculateFinalTotal, toggleModal) 均與前版一致
        function removeFromCart(id) { selectedItems = selectedItems.filter(i => i.id !== id); updateCartUI(); }
        function updateCartUI() {
            const total = selectedItems.reduce((s, i) => s + i.price, 0);
            document.getElementById('total-price').innerText = total.toLocaleString();
            document.getElementById('original-total').innerText = total.toLocaleString();
            document.getElementById('cart-count').innerText = selectedItems.length;
            calculateFinalTotal();
        }
        function calculateFinalTotal() {
            const base = selectedItems.reduce((s, i) => s + i.price, 0);
            const disc = parseInt(document.getElementById('manual-discount').value) || 0;
            document.getElementById('final-total').innerText = (base - disc).toLocaleString();
        }
        function toggleModal(s) { document.getElementById('summary-modal').style.display = s ? 'flex' : 'none'; }
                let carCount = 0;
        let autoTaxDiscount = 0;
        const taxFreeCars = ["SWIFT", "SCROSS", "VITARA", "JIMNY"];

        function removeFromCart(id) {
            if (window.navigator.vibrate) window.navigator.vibrate(40);
            selectedItems = selectedItems.filter(item => item.id !== id);
            updateCartUI();
        }

        function updateCartUI() {
            const baseTotal = selectedItems.reduce((sum, item) => sum + item.price, 0);
            
            // 累計符合補助條件的台數 (排除 CARRY 與 E-VITARA)
            const targetCars = selectedItems.filter(item => {
                const upperName = item.name.toUpperCase();
                if (upperName.includes("E-VITARA") || upperName.includes("CARRY")) return false;
                return taxFreeCars.some(car => upperName.includes(car));
            });
            
            carCount = targetCars.length;
            autoTaxDiscount = carCount * 50000;

            const taxSection = document.getElementById('tax-section');
            if(autoTaxDiscount > 0) {
                taxSection.classList.remove('hidden');
                // 在 updateCartUI 函數內
if(autoTaxDiscount > 0) {
    taxSection.classList.remove('hidden');
    // ... 原本的顯示金額代碼 ...
    
    // 確保備註文字存在 (如果原本被蓋掉了，就補上去)
    taxSection.innerHTML = `
        <div class="flex justify-between items-center text-[#003399] font-bold bg-blue-100 p-2 rounded-lg">
            <span>新購車貨物稅補助 <span id="tax-car-count">(${carCount}台)</span></span>
            <span>- $ <span id="tax-total-display">${autoTaxDiscount.toLocaleString()}</span></span>
        </div>
        <p class="text-[11px] text-blue-500 font-bold text-right italic leading-tight">* 需先入車款後由公司三個月內退至車主帳戶</p>
    `;
}

                document.getElementById('tax-total-display').innerText = autoTaxDiscount.toLocaleString();
                document.getElementById('tax-car-count').innerText = carCount > 1 ? `(${carCount}台)` : "";
            } else {
                taxSection.classList.add('hidden');
            }

            document.getElementById('total-price').innerText = baseTotal.toLocaleString();
            document.getElementById('original-total').innerText = baseTotal.toLocaleString();
            document.getElementById('cart-count').innerText = selectedItems.length;
            
            const cartList = document.getElementById('cart-items-list');
            cartList.innerHTML = selectedItems.length > 0 ? selectedItems.map(item => `
                <div class="flex justify-between items-center bg-white p-4 rounded-2xl shadow-sm border border-gray-50">
                    <div class="flex-1 pr-4 text-left">
                        <p class="font-black text-gray-900 text-sm">${item.name}</p>
                        <p class="text-xs text-[#003399] font-black">$${item.price.toLocaleString()}</p>
                    </div>
                    <button onclick="removeFromCart(${item.id})" class="text-red-500 text-xs bg-red-50 px-4 py-2 rounded-xl font-black click-heavy">移除</button>
                </div>
            `).join('') : '<p class="text-center text-gray-400 py-16 font-bold">選單內尚無品項</p>';
            calculateFinalTotal();
        }

        function calculateFinalTotal() {
            const baseTotal = selectedItems.reduce((sum, item) => sum + item.price, 0);
            const manualDiscount = parseInt(document.getElementById('manual-discount').value) || 0;
            const finalTotal = baseTotal - autoTaxDiscount - manualDiscount;
            document.getElementById('final-total').innerText = finalTotal.toLocaleString();
            return { baseTotal, manualDiscount, finalTotal };
        }

        function generateReceipt() {
            if (window.navigator.vibrate) window.navigator.vibrate([100, 50, 100]);
            if (selectedItems.length === 0) return alert("請先選擇內容");
            const totals = calculateFinalTotal();
            const now = new Date();
            document.getElementById('receipt-date').innerText = `${now.getFullYear()}/${now.getMonth()+1}/${now.getDate()}`;
            document.getElementById('receipt-no').innerText = Math.floor(Math.random()*9000) + 1000;
            
            const receiptItems = document.getElementById('receipt-items');
            receiptItems.innerHTML = selectedItems.map(item => `
                <div class="flex justify-between items-start">
                    <span class="text-sm font-black text-gray-800 flex-1 pr-6">${item.name}</span>
                    <span class="text-sm text-gray-900 font-bold">$${item.price.toLocaleString()}</span>
                </div>
            `).join('');
            
            document.getElementById('receipt-original').innerText = `$ ${totals.baseTotal.toLocaleString()}`;
            
            const taxRow = document.getElementById('receipt-tax-row');
            if(autoTaxDiscount > 0) {
                taxRow.classList.remove('hidden');
                document.getElementById('receipt-tax-count').innerText = carCount > 1 ? `(${carCount}台)` : "";
                document.getElementById('receipt-tax-total').innerText = `- $ ${autoTaxDiscount.toLocaleString()}`;
            } else {
                taxRow.classList.add('hidden');
            }

            const discountRow = document.getElementById('receipt-discount-row');
            if(totals.manualDiscount > 0) {
                discountRow.classList.remove('hidden');
                document.getElementById('receipt-discount').innerText = `- $ ${totals.manualDiscount.toLocaleString()}`;
            } else {
                discountRow.classList.add('hidden');
            }
            
            document.getElementById('receipt-final').innerText = `$ ${totals.finalTotal.toLocaleString()}`;
            document.getElementById('main-app').classList.add('hidden');
            document.getElementById('summary-modal').style.display = 'none';
            document.getElementById('receipt-view').classList.remove('hidden');
            window.scrollTo(0,0);
        }

        function closeReceipt() {
            document.getElementById('main-app').classList.remove('hidden');
            document.getElementById('receipt-view').classList.add('hidden');
        }

        loadData();
    </script>
</body>
</html>
